  <style>
    .logo-dark {
      display: none;
    }

    [data-bs-theme="dark"] .logo-light {
      display: none;
    }

    [data-bs-theme="dark"] .logo-dark {
      display: inline;
    }

    .logo {
      height: 55px;
      vertical-align: middle;
    }


    :root {
      /* Tema chiaro */
      --bg-color: #ededed;
      --text-color: #1f1f1f;
      --btn-bg: #b0b0b0;
      --btn-border: #b0b0b0;
      --btn-text: #1f1f1f;
      --btn-hover-bg: #c0c0c0;
      --btn-hover-border: #c0c0c0;
    }

    html[data-bs-theme="dark"] {
      /* Tema scuro*/
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --btn-bg: #1f1f1f;
      --btn-border: #1f1f1f;
      --btn-text: #e0e0e0;
      --btn-hover-bg: #2a2a2a;
      --btn-hover-border: #2a2a2a;
    }

    .form-check-input {
      background-color: var(--btn-border);
      border-color: var(--btn-border);
      transition: background-color 0.3s, border-color 0.3s;
    }

    .form-check-input:checked {
      background-color: var(--btn-bg);
      border-color: var(--btn-bg);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }

    .btn-primary {
      background-color: var(--btn-bg);
      border-color: var(--btn-border);
      color: var(--btn-text);
      transition: background-color 0.3s, border-color 0.3s, color 0.3s;
    }

    .btn-primary:hover,
    .btn-primary:focus,
    .btn-primary:active {
      background-color: var(--btn-hover-bg);
      border-color: var(--btn-hover-border);
      color: var(--btn-text);
    }

    .btn-tastiera-ipa {
      flex: 1 1 0;
      max-width: 40px;
      min-width: 40px;
      text-align: center;
      font-weight: bold;
      font-size: large;
    }

    .btn-tastiera-parentesi {
      flex: 1 1 0;
      max-width: 80px;
      min-width: 80px;
      text-align: center;
      font-weight: bold;
      font-size: large;
    }

    .btn-tastiera-diacritici {
      flex: 1 1 0;
      max-width: 40px;
      min-width: 40px;
      text-align: center;
      font-weight: bolder;
      font-size: large;
    }


    @media (max-width: 576px) {

      .d-flex.justify-content-center.gap-2 {
        flex-wrap: wrap;
        gap: 5px !important;
      }


      .btn-tastiera-ipa,
      .btn-tastiera-parentesi,
      .btn-tastiera-diacritici {
        max-width: none;
        min-width: 0;
        flex-grow: 1;

        flex-shrink: 1;
        min-height: 40px;

        padding: 0.375rem 0.5rem;
        font-size: small;
      }

      .btn-tastiera-parentesi {
        min-width: 45%;
        max-width: 45%;
      }

      .d-flex.align-items-center.gap-3.mb-3 {
        flex-wrap: wrap;
        justify-content: space-around !important;
      }

      .d-flex.align-items-center>.form-select-sm {
        width: 100% !important;
      }
    }
  </style>
</head>

    <script>


      function insertLettera(lettera, parentesi = false) {
        const textarea = document.getElementById('textArea');
        textarea.focus(); //ri-assicura il focus sulla textarea

        //sposta il cursore dopo la lettera inserita nella stringa della textarea
        textarea.setRangeText(lettera, textarea.selectionStart, textarea.selectionEnd, 'end');

        // aggiunge 1 carattere di offset per i tasti con le parentesi
        if (parentesi) {
          const newPos = textarea.selectionStart - lettera.length + 1;
          textarea.setSelectionRange(newPos, newPos);
        }

        //check aggiuntivo per mobile per evitare flicker della tastiera
        if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
          textarea.blur();
        }
      }
    </script>




    <script>
      const htmlEl = document.documentElement;
      const themeToggle = document.getElementById('themeToggle');
      const themeLabel = document.getElementById('themeLabel');

      // cambia label in base al tema corrente
      function updateLabel(theme) {
        themeLabel.textContent = theme === 'dark' ? 'Dunklem' : 'Hellem';
      }

      // inizializza tema in base a quello di sistema
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const initialTheme = prefersDark ? 'dark' : 'light';
      htmlEl.setAttribute('data-bs-theme', initialTheme);
      themeToggle.checked = prefersDark;
      updateLabel(initialTheme);

      // flag per override dall'utente
      let userToggled = false;

      themeToggle.addEventListener('change', () => {
        userToggled = true;
        if (themeToggle.checked) {
          htmlEl.setAttribute('data-bs-theme', 'dark');
          updateLabel('dark');
        } else {
          htmlEl.setAttribute('data-bs-theme', 'light');
          updateLabel('light');
        }
      });



      // Listener si attiva solo se non è stato manualmente cambiato il tema
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!userToggled) {
          const newTheme = e.matches ? 'dark' : 'light';
          htmlEl.setAttribute('data-bs-theme', newTheme);
          themeToggle.checked = e.matches;
          updateLabel(newTheme);
        }
      });


      const alignmentSelect = document.getElementById('alignmentSelect');
      const textarea = document.getElementById('textArea');

      // allineamento testo di default
      textarea.style.textAlign = 'center';

      alignmentSelect.addEventListener('change', () => {
        textarea.style.textAlign = alignmentSelect.value;
      });
    </script>

    <script>
      const popoverToggle = document.getElementById('popoverToggle');
      const popoverLabel = document.getElementById('popoverLabel');



      const popoverButtons = Array.from(document.querySelectorAll('button[data-bs-content]'));

      function enablePopovers() {
        popoverButtons.forEach(btn => {
          btn.setAttribute('data-bs-toggle', 'popover');
        });

        popoverButtons.forEach(btn => {
          new bootstrap.Popover(btn);
        });
      }


      function disablePopovers() {
        popoverButtons.forEach(btn => {
          const popoverInstance = bootstrap.Popover.getInstance(btn);
          if (popoverInstance) {
            popoverInstance.dispose();
          }
          btn.removeAttribute('data-bs-toggle');
        });
      }

      // toggle descrizioni
      popoverToggle.addEventListener('change', () => {
        if (popoverToggle.checked) {
          enablePopovers();
          popoverLabel.textContent = 'Beschriftung'; // Cambia label corrente in Descrizioni ON
        } else {
          disablePopovers();
          popoverLabel.textContent = 'Beschriftung'; // Cambia label corrente in Descrizioni OFF
        }
      });

      if (popoverToggle.checked) {
        enablePopovers();
      } else {
        disablePopovers();
      }

      // Decide quale label usare in base allo stato del toggle quando la pagina viene caricata
      popoverLabel.textContent = popoverToggle.checked ? 'Beschriftung' : 'Beschriftung'; //ON : OFF

      // Backspace button functionality
      document.getElementById('backspaceBtn').addEventListener('click', () => {
        const textarea = document.getElementById('textArea');
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        if (start === end && start > 0) {
          // Remove un singolo carattere prima del cursore
          const text = textarea.value;
          textarea.value = text.slice(0, start - 1) + text.slice(end);
          textarea.selectionStart = textarea.selectionEnd = start - 1;
        } else if (start !== end) {
          // Rimuove il testo selezionato
          const text = textarea.value;
          textarea.value = text.slice(0, start) + text.slice(end);
          textarea.selectionStart = textarea.selectionEnd = start;
        }
        textarea.focus();
      });

      // Variable to store the timer so multiple clicks don't conflict
      let copyTimeout;
      const copyBtn = document.getElementById('copyBtn');
      // Initialize this one separately so it's always ready
      const copyPopover = new bootstrap.Popover(copyBtn);

      copyBtn.addEventListener('click', async () => {
        const textarea = document.getElementById('textArea');

        try {
          // 1. Copy the text
          await navigator.clipboard.writeText(textarea.value);

          // 2. Show the feedback
          clearTimeout(copyTimeout);
          copyPopover.show();

          // 3. Hide after 1.5 seconds
          copyTimeout = setTimeout(() => {
            copyPopover.hide();
          }, 1500);

        } catch (err) {
          console.error('Copy failed', err);
        }
      });


    </script>
